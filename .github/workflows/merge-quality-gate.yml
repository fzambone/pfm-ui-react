# Merge-to-main full quality gate — triggers on every push to main.
# Runs the full suite: lint → type-check → unit/component tests → E2E → build.
# E2E tests run against the Vite preview server (built output).
# All action versions are pinned; no `latest` references.

name: Merge Quality Gate

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  full-gate:
    name: full-gate
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test (unit + component) with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Test (E2E)
        run: pnpm exec playwright test
        env:
          BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
